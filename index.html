<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgendaAI con Gemini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="logo">AgendaAI <sup>Gemini</sup></div>
      <div style="display: flex; gap: 10px;">
        <button class="gcal-btn" id="gcalBtn" onclick="handleGCalBtn()">
          <span id="gcalBtnText">Vincular Calendar</span>
          <div class="gcal-dot" aria-hidden="true"></div>
        </button>
      </div>
    </header>

    <section aria-label="Agregar evento">
      <p class="section-label">Agregar evento</p>

      <div class="card">
        <div class="tabs" role="tablist">
          <button class="tab active" id="tabManual" role="tab" onclick="setTab('manual')">Manual</button>
          <button class="tab"        id="tabAI"     role="tab" onclick="setTab('ai')">Texto / Imagen</button>
          <button class="tab"        id="tabAudio"  role="tab" onclick="setTab('audio')">🎙 Audio</button>
        </div>

        <div class="form-body" id="panelManual" role="tabpanel">
          <div class="field">
            <label class="field-label" for="mTitle">Título</label>
            <input type="text" id="mTitle" placeholder="Ej. Examen de Cálculo…" autocomplete="off" />
          </div>

          <div class="field field-row">
            <div>
              <label class="field-label" for="mDate">Fecha</label>
              <input type="date" id="mDate" />
            </div>
            <div>
              <label class="field-label" for="mTime">Hora</label>
              <input type="time" id="mTime" />
            </div>
          </div>
          
          <div class="field">
            <label class="field-label">Aviso previo</label>
            <div class="reminder-options">
              <label class="reminder-option selected">
                <input type="checkbox" id="mRem10" name="manualReminderGroup" value="10" checked onchange="updateReminderOption(this)" />
                <span>10 minutos</span>
              </label>

              <label class="reminder-option">
                <input type="checkbox" id="mRem60" name="manualReminderGroup" value="60" onchange="updateReminderOption(this)" />
                <span>1 hora</span>
              </label>

              <label class="reminder-option">
                <input type="checkbox" id="mRem360" name="manualReminderGroup" value="360" onchange="updateReminderOption(this)" />
                <span>6 horas</span>
              </label>

              <label class="reminder-option">
                <input type="checkbox" id="mRem1440" name="manualReminderGroup" value="1440" onchange="updateReminderOption(this)" />
                <span>1 día</span>
              </label>

              <label class="reminder-option">
                <input type="checkbox" id="mRem10080" name="manualReminderGroup" value="10080" onchange="updateReminderOption(this)" />
                <span>1 semana</span>
              </label>
            </div>
          </div>

          <div class="field">
            <label class="field-label">Categoría</label>
            <div class="chips" id="manChips">
              <button class="chip sel-examen"  data-cat="examen"       onclick="pickCat(this)">Examen</button>
              <button class="chip"             data-cat="estudio"      onclick="pickCat(this)">Estudio</button>
              <button class="chip"             data-cat="social"       onclick="pickCat(this)">Social</button>
              <button class="chip"             data-cat="presentacion" onclick="pickCat(this)">Presentación</button>
              <button class="chip"             data-cat="tarea"        onclick="pickCat(this)">Tarea</button>
              <button class="chip"             data-cat="otro"         onclick="pickCat(this)">Otro</button>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn btn-primary" onclick="addManual()">Agregar evento</button>
          </div>
        </div>

        <div class="form-body" id="panelAI" role="tabpanel" style="display:none">
          <div class="img-drop" id="imgDrop" ondrop="handleImageDrop(event)" ondragover="event.preventDefault()" ondragleave="event.preventDefault()">
            <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleFileInput(event)" />
            <div class="img-drop-inner" id="imgDropInner">
              <span class="img-drop-text">Arrastra una imagen aquí</span>
              <span class="img-drop-sub">o <button class="img-link" onclick="document.getElementById('imgFile').click()">selecciona archivo</button></span>
            </div>
            <div class="img-preview-wrap" id="imgPreviewWrap" style="display:none">
              <img id="imgPreview" class="img-preview" alt="Imagen adjunta" />
              <button class="img-remove" onclick="removeImage()">✕</button>
              <span class="img-preview-label">Imagen lista</span>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="aiText">Descripción adicional</label>
            <div class="ai-wrap">
              <textarea id="aiText" placeholder="Ej: Tengo examen de física el viernes 20 a las 9am…"></textarea>
              <span class="ai-tag">✨ Gemini</span>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn btn-primary gemini-btn" id="aiBtn" onclick="analyzeAI()">
              <span id="aiTxt">Analizar con Gemini</span>
            </button>
          </div>

          <div class="ai-result" id="aiResult" aria-live="polite">
            <p class="ai-result-label">Evento detectado</p>
            <div class="ai-rows" id="aiRows"></div>
            
            <div class="field" style="margin-top: 20px;">
              <label class="field-label">Aviso previo</label>
              <div class="reminder-options">
                  <label class="reminder-option selected">
                    <input type="checkbox" id="aiRem10" name="aiReminderGroup" value="10" checked onchange="updateReminderOption(this)" />
                    <span>10 minutos</span>
                  </label>
                
                  <label class="reminder-option">
                    <input type="checkbox" id="aiRem60" name="aiReminderGroup" value="60" onchange="updateReminderOption(this)" />
                    <span>1 hora</span>
                  </label>
                
                  <label class="reminder-option">
                    <input type="checkbox" id="aiRem360" name="aiReminderGroup" value="360" onchange="updateReminderOption(this)" />
                    <span>6 horas</span>
                  </label>
                
                  <label class="reminder-option">
                    <input type="checkbox" id="aiRem1440" name="aiReminderGroup" value="1440" onchange="updateReminderOption(this)" />
                    <span>1 día</span>
                  </label>
                
                  <label class="reminder-option">
                    <input type="checkbox" id="aiRem10080" name="aiReminderGroup" value="10080" onchange="updateReminderOption(this)" />
                    <span>1 semana</span>
                  </label>
              </div>
            </div>

            <div class="btn-row" style="margin-top:20px">
              <button class="btn btn-ghost" onclick="dismissAI()">Cancelar</button>
              <button class="btn btn-primary" onclick="confirmAI()">Agendar →</button>
            </div>
          </div>
        </div>

        <div class="form-body" id="panelAudio" role="tabpanel" style="display:none">
          <div class="audio-recorder">
            <div class="audio-status" id="audioStatus">
              <div class="audio-icon" id="audioIcon">🎙</div>
              <p class="audio-label" id="audioLabel">Toca para hablar</p>
              <p class="audio-sub" id="audioSub">Cuéntale a Gemini sobre tu evento</p>
            </div>

            <button class="audio-btn" id="audioBtn" onclick="toggleRecording()">
              <span id="audioBtnIcon">⏺</span>
            </button>
          </div>

          <div class="ai-result" id="aiResultAudio" aria-live="polite">
            <p class="ai-result-label">Evento detectado por voz</p>
            <div class="ai-rows" id="aiRowsAudio"></div>
            
            <div class="field" style="margin-top: 20px;">
              <label class="field-label">Aviso previo</label>
              <div class="reminder-options">
                  <label class="reminder-option selected">
                    <input type="checkbox" id="audioRem10" name="audioReminderGroup" value="10" checked onchange="updateReminderOption(this)" />
                    <span>10 minutos</span>
                  </label>
                
                  <label class="reminder-option">
                    <input type="checkbox" id="audioRem60" name="audioReminderGroup" value="60" onchange="updateReminderOption(this)" />
                    <span>1 hora</span>
                  </label>
                
                  <label class="reminder-option">
                    <input type="checkbox" id="audioRem360" name="audioReminderGroup" value="360" onchange="updateReminderOption(this)" />
                    <span>6 horas</span>
                  </label>
                
                  <label class="reminder-option">
                    <input type="checkbox" id="audioRem1440" name="audioReminderGroup" value="1440" onchange="updateReminderOption(this)" />
                    <span>1 día</span>
                  </label>
                
                  <label class="reminder-option">
                    <input type="checkbox" id="audioRem10080" name="audioReminderGroup" value="10080" onchange="updateReminderOption(this)" />
                    <span>1 semana</span>
                  </label>
              </div>
            </div>

            <div class="btn-row" style="margin-top:20px">
              <button class="btn btn-ghost" onclick="dismissAudio()">Cancelar</button>
              <button class="btn btn-primary" onclick="confirmAudio()">Agendar →</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="events-section">
      <div class="events-header">
        <p class="section-label">Tus eventos</p>
        <span class="events-count" id="evCount">0 eventos</span>
      </div>
      <div class="events-list" id="evList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
