services:
  - type: web
    name: calendaria
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npm run ci
    startCommand: npm start
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        value: https://calendaria.onrender.com
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
