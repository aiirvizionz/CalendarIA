name: Patch calendar contract

on:
  push:
    branches:
      - agent/fix-calendar-create-contract

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Patch createCalendarEvent contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/services/google.js')
          source = path.read_text(encoding='utf-8')
          replacements = {
              "if (duplicate) return { ...duplicate, duplicate: true };": "if (duplicate) return { event: duplicate, duplicate: true };",
              "return { ...created, duplicate: false };": "return { event: created, duplicate: false };",
          }

          for old, new in replacements.items():
              if old in source:
                  source = source.replace(old, new, 1)
              elif new not in source:
                  raise SystemExit(f'Expected calendar contract marker not found: {old}')

          path.write_text(source, encoding='utf-8')
          PY

          if git diff --quiet -- src/services/google.js; then
            echo "Calendar contract is already patched."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/services/google.js
          git commit -m "fix: return explicit calendar creation contract"
          git push origin "HEAD:${GITHUB_REF_NAME}"
